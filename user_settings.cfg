[gcode_macro COUNTDOWN_TIMER]
description: Display a countdown timer with seconds remaining, syntax for calling is COUNTDOWN_TIMER TIME=<seconds>
gcode:
    {% set time_remaining = params.TIME|default(10)|int %}
    RESPOND PREFIX=>> MSG="Starting countdown: {time_remaining} seconds"                     ; Display start message
    {% for i in range(time_remaining, 0, -1) %}
        RESPOND PREFIX=> MSG="   Time Remaining: { i } seconds"             ; Display remaining time
        G4 P1000                                                          ; Wait for 1 second
    {% endfor %}
    RESPOND PREFIX=> MSG="COUNTDOWN COMPLETE!"
   
[gcode_macro PLAY_MELODY]
gcode:
  # Play C (261.63 Hz) for 500 ms
  SET_PIN pin=beeper value=0.25 cycle_time=0.003822 # 1/261.63 ≈ 0.003822
  G4 P200   # Wait for 500 ms

  # Play G (392 Hz for 500ms
  SET_PIN pin=beeper value=0.75 cycle_time=0.00255 # 1/392 ≈ 0.00266
  
  # Play D (293.66 Hz) for 500 ms
  ;SET_PIN pin=beeper value=0.5 cycle_time=0.003405 # 1/293.66 ≈ 0.003405
  G4 P600   # Wait for 500 ms

  # Play E (329.63 Hz) for 500 ms
  SET_PIN pin=beeper value=0.5 cycle_time=0.003033 # 1/329.63 ≈ 0.003033
  G4 P500   # Wait for 500 ms

  # Turn off the sound (set value to 0)
  SET_PIN pin=beeper value=0

