[gcode_macro CG28]
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}


[gcode_macro Custom_Print_Start]                                                                ; CDW 08/23/2024  Override the print_start macro with this custom 1, takes
variable_small_print: False
gcode:
    RESPOND PREFIX=> MSG="Starting the CUSTOM_PRINT_START macro"
    Part_Light_ON 
    G92 E0 
    G90                                                                                         ; Use absolute coordinates
    status_homing
    CG28                                                                                        ; Home if not already homed
    BED_MESH_CLEAR    
    {% set BED_TEMP = params.BED_TEMP|default(80)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(240)|float %}
    {% set BED_MESH = params.BED_MESH|default('adaptive')|string %} ; One of: adaptive (default), full, default (or any other value as the bed mesh profile name), none
    {% set TIMER = params.TIMER|default(60)|float %}
    ############################################
    ##  09/14/2024 CDW  added the print size and test to turn off outer bed when not needed
    ############################################
    {% set X_MIN = params.PRINT_MIN_X|default(50)|float %}                                      ; print size parameters to assess outer heater
    {% set Y_MIN = params.PRINT_MIN_Y|default(50)|float %}                                      ; print size parameters to assess outer heater
    {% set X_MAX = params.PRINT_MAX_X|default(175)|float %}                                     ; print size parameters to assess outer heater
    {% set Y_MAX = params.PRINT_MAX_Y|default(175)|float %}                                     ; print size parameters to assess outer heater
    {% set X_START = params.X_START|default(5)|float %}                                         ; x start position of the Purge line
    {% set Y_START = params.Y_START|default(5)|float %}                                         ; y start position of the Purge line
    {% set X_END = params.X_END|default(150)|float %}                                           ; x end position of the Purge line
    {% set Y_END = params.Y_END|default(5)|float %}                                             ; y end position of the Purge line
    {% set LAY_OFFSET = params.FIRST_LAYER|default(0)|float %}                                 ; amount of extra offset to add after the z-offset is set by beacon
    {% set SENSOR = params.SENSOR|default('True')|string %}                                     ; CDW 01/18/2025 should the sensor be turned off or on - for transparent filaments

    SET_GCODE_OFFSET Z=0                                                                        ; reset any gcode offsets present
    ;M118 Calibrating the Beacon Model
    ;G28 Z METHOD=CONTACT CALIBRATE=1                                                       ;  calibrate the beacon model
    RESPOND PREFIX===> MSG="     waiting for bed to get to temp"
    status_heating 
    G1 Z15 F12000 
    SET_BED_TEMPERATURE TARGET={BED_TEMP}                                                     ; Heat Bed to target temp
    BED_TEMPERATURE_WAIT MINIMUM={BED_TEMP-1.25} MAXIMUM={BED_TEMP+4}                            ; Waits until the bed reaches close to target
    ;{% endif%}
    #################################################
    ##  09/24/2024 CDW  end of mod section
    #################################################
    
    ###############################################
    ##    09/09/2024  CDW   adding these next couple of steps to auto compensate for level bed, 
    ##                      and automated z offet for every print
    ################################################
    RESPOND PREFIX===> MSG="Bring extruder up to temp"     
    status_heating                                                                    
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER_TEMP}                               ; Set and heat the final extruder temperature
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-8} MAXIMUM={EXTRUDER_TEMP+10}       ; Wait for extruder to reach near target temperature
    
    RESPOND PREFIX===> MSG="Heat soak the Extruder and Bed for {TIMER} seconds"
    status_cleaning
    COUNTDOWN_TIMER TIME={TIMER}                                                                ; wait for bed to settle out and heat soak the BeaconH for 60 seconds.   May stop thermal drift
    G1 E-1 F1800   
    ;G28 Z METHOD=CONTACT CALIBRATE=1                                                                             ; retract 3mm prior calibrating
    RESPOND PREFIX===> MSG="building {BED_MESH} mesh"
    status_meshing
    {% if BED_MESH == 'full' %}
      BED_MESH_CALIBRATE
    {% elif BED_MESH == 'adaptive' %}
      BED_MESH_CALIBRATE ADAPTIVE=1
    {% elif BED_MESH != 'none' %}
      BED_MESH_PROFILE LOAD={BED_MESH}
    {% endif %}
   RESPOND PREFIX===> MSG="Cleaning ooze from nozzle"
    status_cleaning
    CLEAN_NOZZLE NX_START=100 NY_START=1 NX_END=160 NY_END=4 Z_HGHT=3.5

    RESPOND PREFIX===> MSG="About to start the z calibration with the hot extruder"
    status_calibrating_z
    G28 Z METHOD=CONTACT CALIBRATE=1                                                            ;  calibrate the z offset and Beacon model with hot extruder
    RESPOND PREFIX===> MSG="setting additional z-offset to {LAY_OFFSET}"      ;  This step is now set to 0 in standard config.   Using the filament machine g_code to set offset
    SET_GCODE_OFFSET Z_ADJUST={LAY_OFFSET} MOVE=1                             ; after running input shaper, the z-offset is consistently 0.1 low on the autocalibrate
    
    {% if SENSOR == 'True' %}
      RESPOND PREFIX===> MSG="     Turn on the filament Sensor"
      ;SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
      SET_FILAMENT_SENSOR SENSOR=sp_sensor_runout ENABLE=1
    {% endif %}
    ###############################################################
    #   08/23/2024  CDW   pulled the following section out of machine start g_code and is the purge to replace the LINE_PURGE.   
    ###############################################################
    RESPOND PREFIX===> MSG="Starting Print...."
    status_printing
    G92 E0                                                            ; Reset Extruder
    G1 X{Y_START} Y{Y_START} Z2 F27000                              ; Move to start position
    G1 Z0.5
    G1 X{X_END} Y{Y_END} E60 F1000                                    ; Draw the first line (purging nozzle)
    M106 S250                                                         ; Turn the part fan to 70% to break the strand from the nozzle
    G1 Z5 F2000.0                                                      
    G1 X115 Y-2 Z3.5 F16000                                              ; Move to the start of the clean nozzle 
    G91                                                               ; Set to relative movements
    G1 E1 F6000

    WIGGLE X_POS={printer.gcode_move.position.x}                      ; run the quick wiggle macro to break the Purged extrusion
    G90                                                               ; set to absolute coordinates and movements
    ;G92 E0                                                            ; Reset Extruder. 02/26/2025 CDW Commented
    M220 S100                                                         ; Set the print speed to 100%   CDW 07/27/2024 - OpenNeptune sets this to 50% by default
    Frame_Light_ON                                                    ; Turn on the frame LED's
                                                             
;[gcode_macro GO]
;gcode:
;  {% if printer['gcode_macro variables'].extruder_type == "BMG" %}                            ; 07/13/2025 CDW   if this is a WW-BMG extruder, there is a synching of parts fans
;      START_FAN_SYNC_LOOP                                                                       ;  extruder type set in the config file for the specific extruder 
;  {% endif %}

[gcode_macro WIGGLE]
description: Wiggles the printer head to break the purged filament
gcode:
  {% set XPOS = params.X_POS|default(printer.gcode_move.position.x)|float %}
      Respond PREFIX==> MSG="value of X_POS ==> {XPOS}"
      M106 S255                                                        ; Turn the part fan to 100%
      G4 P2000                                                         ; wait for 2 seconds for the filament to harden.   CDW 8/10/2024
      G91                                                             ; relative positioning 
      {% if XPOS < 200 %}
        G1 X20 F23000                                                    ; wiggle movement to ensure free movement of purge
        G1 X-20 F23000
        G1 X20 F23000
        G1 X-20 F23000
        G1 X20 F23000
        G1 X-20 F23000   
      {% else %}
        G1 X-20 F23000
        G1 X20 F23000
        G1 X-20 F23000
        G1 X20 F23000
        G1 X-20 F23000
        G1 X+20 F23000
      {% endif %}
      ;G90                                                              ; Absolute positioning     
      M106 S0                                                           ; Turn the part fan off  

[gcode_macro CLEAN_NOZZLE]    
description:   Cleans any ooze off the nozzle
gcode:
    {% set X_START = params.NX_START|default(5)|float %}                                         ; x start position of the Purge line
    {% set Y_START = params.NY_START|default(5)|float %}                                         ; y start position of the Purge line
    {% set X_END = params.NX_END|default(150)|float %}                                           ; x end position of the Purge line
    {% set Y_END = params.NY_END|default(5)|float %}                                             ; y end position of the Purge line
    {% set Z_HGHT = params.N_SET|default(3)|float %}
    G90
    G1 X{X_START} Y{Y_START} Z{Z_HGHT} F15000
    G1 X{X_END} Y{Y_END} Z{Z_HGHT} F16000
    G1 X{X_START} Y{Y_END} Z{Z_HGHT} F8000
    G1 X{X_END} Y{Y_END} Z{Z_HGHT} F8000
    G1 X{X_START} Y{Y_START} Z{Z_HGHT} F16000
    G1 X{X_START} Y{Y_START} Z{Z_HGHT} F8000
    G1 X{X_END} Y{Y_END} Z{Z_HGHT} F16000
    G1 X{X_START} Y{Y_END} Z{Z_HGHT} F8000
    G1 X{X_END} Y{Y_END} Z{Z_HGHT} F8000
    G1 X{X_START} Y{Y_START} Z{Z_HGHT} F16000

#######################################################################
#   Custom Pause / Resume
#
#   01/23/2025  CDW - Added here to not be overwritten if an ON update happens to printer.cfg
#                     changed this to match mainsail functions more closely and allow the Pico mmu to function as coded
########################################################################

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
variable_restore_idle_timeout: 0
gcode:
  ##### get user parameters or use default ##### 
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set idle_timeout = client.idle_timeout|default(0) %}
  {% set temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 0%}
  {% set restore = False if printer.toolhead.extruder == ''
              else True  if params.RESTORE|default(1)|int == 1 else False %}
  ##### end of definitions #####
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE="{{'restore': restore, 'temp': temp}}"
  # set a new idle_timeout value
  {% if idle_timeout > 0 %}
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=restore_idle_timeout VALUE={printer.configfile.settings.idle_timeout.timeout}
    SET_IDLE_TIMEOUT TIMEOUT={idle_timeout}
  {% endif %}
  PAUSE_BASE
  G1 X-10 Y200 Z30 f20000              ; Park head at the side of the plate

[gcode_macro X_POSITIOM]
gcode:
  M118 {printer.gcode_move.position.x }
  
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
variable_last_extruder_temp: {'restore': False, 'temp': 0}
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set sp_move = client.speed_move|default(velocity) %}
  ##### end of definitions #####
  # restore idle_timeout time if needed
  {% if printer['gcode_macro PAUSE'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro PAUSE'].restore_idle_timeout}
  {% endif %}
  {% if printer.idle_timeout.state|upper == "IDLE" %}
    {% if last_extruder_temp.restore %} M109 S{last_extruder_temp.temp} {% endif %}
  {% endif %}
  _CLIENT_EXTRUDE
  G91                                                                           ; relative positioning
  M83                                                                           ; set extruder to relative mode
#  G1 E40  F200                                                                  ; extrude 40mm of filament to prime the nozzle  CDW 8/16/2024 changed from 80mm
  G4 P2000                                                                      ; wait for 2 seconds to stabilise pressure 
  RESPOND MSG="Going to do the wiggle in the user_setting RESUME"
  #WIGGLE X_POS={printer.gcode_move.position.x}
  G90
  RESUME_BASE VELOCITY={params.VELOCITY|default(sp_move)}  

[gcode_macro PARK_HEAD]
gcode:
  RESPOND PREFIX=parking MSG="Parking toolhead"
  {% if (("xyz" in printer.toolhead.homed_axes) and 
    ( printer.toolhead.position.z|float != 0.0  and 
      printer.toolhead.position.x|float != 110.0 and
      printer.toolhead.position.y|float != 110.0)) %}
     _POSITION_NOZZLE_OVER_BUCKET
  {% else %}
    RESPOND PREFIX=parking MSG="... homing required"
    G28 X
    _POSITION_NOZZLE_OVER_BUCKET
  {% endif %}


[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes, if the extruder is hot enough
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set use_fw_retract = (client.use_fw_retract|default(false)|lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH|default(client.unretract)|default(1.0)|float %}
  {% set speed = params.SPEED|default(client.speed_unretract)|default(35) %}
  {% set absolute_extrude = printer.gcode_move.absolute_extrude %}
  ##### end of definitions #####
  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        {% if length < 0 %}
          G10
        {% else %}
          G11
        {% endif %}
      {% else %}
        M83
        G1 E{length} F{(speed|float|abs) * 60}
        {% if absolute_extrude %}
          M82
        {% endif %}
      {% endif %}
    {% else %}
      RESPOND TYPE=echo MSG='Extruder not hot enough'
    {% endif %}
  {% endif %}


[gcode_macro _POSITION_NOZZLE_OVER_BUCKET]
gcode: 
	RESPOND PREFIX=parking MSG="... Positioning nozzle over purge bucket"
  G90 
	G1 X5 Y200 F6000 

