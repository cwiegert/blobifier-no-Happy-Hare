##########################################################################
##    08/25/2024  CDW   Custom print start job to make sure the lights are on, and the motherboard fan is started.   Becuse the motherboard fan has been 
##                      moved from the board switch, it will be controled during the print start, stop, pause and resume    
##                      For the Cusotmer_Print_Start macro to work correctly, it shoudl be called with 2 parameters
##                        BED_TEMP  --> What temp should the bed be
##                        EXTRUDER_TEMP -->  What temp should the extruder be
##                        BED_MESH -->  how the bed mesh should be created.  adaptive, full 
##    09/14/2024 CDW      PRINT_MIN_X --> the first_layer_print_min[0] is the min x coordinate of the print
##      added the print   PRINT_MIN_Y --> the first_layer_print_min[1] is the min y coordinate of the print
##      size              PRINT_MAX_X --> the first_lyer_print_max[0] is the max x coodinate of the print
##                        PRINT_MAX_Y --> the first_layer_print_max[1] is the max y coordinate of the print
##   10/11/2014 CDW       X_START   -->   X position of the start of the purge line
##      added             Y_START   -->   Y position of the start of the purge line
##                        X_END     -->   X position of the end of the purge line
##                        Y_END     -->   Y position of the end of the purge line     Added to be able to change the direction of the purge line in the printer definition
##                      an example call
##                        Custom_Print_Start BED_TEMP=[bed_temperature_initial_layer_single] EXTRUDER_TEMP=[nozzle_temperature_initial_layer] 
##                          BED_MESH=adaptive TIMER=30 X_START=5 Y_START=5 X_END=150 Y_END=5 PRINT_MIN_X={first_layer_print_min[0]} PRINT_MAX_X={first_layer_print_max[0]} 
##                          PRINT_MIN_Y={first_layer_print_min[1]} PRINT_MAX_Y={first_layer_print_max[1]}
##
##   09/30/2024 CDW     added the time lapse ability from moonraker
##   10/11/2014 CDW     changed the purge line logic in CUSTOM_PRING_START to take the parameters given from the machine start gCo
##   10/12/2014 CDW     set up the file to be monitored by inotify to send files to my git repo at git@github.com:cwiegert/Neptune-Config-Files.git
##   10/23/2024 CDW     added the mooons MS17HD2P4150 as a motor config, replacing the x & y steppers with 1.8° motors from Moons
##   01/082025  CDW     added the sp_mmu.cfg and started testing added the sp_mmu.cfg
##   01/28/2025 CDW     changed the filament sensor to not pause on runout.  Commented out the RESUME, so that it only uses the PICO resume
##   06/20/2025 CDW     recovered gitrepo with local files
##   07/13/2025 CDW     configuring the new extruder and dragon hotend.  the MCU dragon is a H36 with the extruder and all controls running off the PCB
##                      connected to the A4T printer head
##  07/19/2025  CDW     modified print start to account for the new A4T print head
##  11/02/2015  CDW     added more light changes to the Custom_print_start macro              
############################################################################

