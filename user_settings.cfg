;serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_43000E000950415742363820-if00               ; CDW  07/02/2025 New Fystec H36 for use with WW-BMG
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_42002F000950415742363820-if00

