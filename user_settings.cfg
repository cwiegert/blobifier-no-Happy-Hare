#########################################################
#. 7/22/2024  CDW   modified the macro to match my previous macro.   MOves printer head to front of bed
#                   for ease of changing filiment
# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.
##########################################################

[gcode_macro M600]
description: Pauses print to allow for a manual filiment change
  Usage: M201 [X <move to x position>] [Y<move to y position>] [Z <move to Z position>]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    #M300 P1000 S1
   # M300 P100 S1
    ;M300 P50 S1                    ;  CDW. 8/16/2024   commented out the beeping noise when using the macro for pause 
    ;M300 P50 S1
    ;M300 P50 S1
    ;m300 P500 S400
    M118 Ready to load new filament
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000

    M118 Setting at new position X={X} Y={Y}  Z={Z} 
    RESTORE_GCODE_STATE NAME=M600_state
